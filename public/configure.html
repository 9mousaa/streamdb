<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamDB - Configure</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; margin-bottom: 30px; }
    .section { background: #151520; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .section h2 { font-size: 1.1rem; margin-bottom: 16px; color: #aaa; }
    label { display: block; font-size: 0.9rem; color: #888; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 12px; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; color: #fff; font-size: 0.95rem; margin-bottom: 12px; }
    input:focus, select:focus { outline: none; border-color: #4a9eff; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .chip { padding: 6px 14px; border-radius: 20px; background: #1a1a2e; border: 1px solid #2a2a3e; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .chip.active { background: #1a3a6e; border-color: #4a9eff; color: #4a9eff; }
    .btn { width: 100%; padding: 14px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn:hover { background: #3a8eef; }
    .result { background: #151520; border-radius: 12px; padding: 20px; margin-top: 16px; display: none; }
    .result input { background: #0a0a15; font-family: monospace; font-size: 0.85rem; }
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    .stat { background: #151520; border-radius: 8px; padding: 14px; text-align: center; }
    .stat .num { font-size: 1.5rem; font-weight: 700; color: #4a9eff; }
    .stat .label { font-size: 0.8rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>StreamDB</h1>
    <p class="subtitle">The perfect stream, every time.</p>

    <div class="stats" id="stats"></div>

    <div class="section">
      <h2>Debrid Services</h2>
      <label>Real-Debrid API Key</label>
      <input type="password" id="rdKey" placeholder="Enter your RD API key">
      <label>TorBox API Key</label>
      <input type="password" id="tbKey" placeholder="Enter your TorBox API key">
    </div>

    <div class="section">
      <h2>Video Quality</h2>
      <label>Preferred Resolutions (in order)</label>
      <div class="checkbox-group" id="resolutions">
        <span class="chip active" data-val="2160p">4K</span>
        <span class="chip active" data-val="1080p">1080p</span>
        <span class="chip" data-val="720p">720p</span>
        <span class="chip" data-val="480p">480p</span>
      </div>
      <label>HDR Preference</label>
      <div class="checkbox-group" id="hdr">
        <span class="chip active" data-val="DV">Dolby Vision</span>
        <span class="chip active" data-val="HDR10+">HDR10+</span>
        <span class="chip active" data-val="HDR10">HDR10</span>
        <span class="chip active" data-val="SDR">SDR</span>
      </div>
    </div>

    <div class="section">
      <h2>Audio</h2>
      <label>Preferred Audio Language</label>
      <select id="audioLang">
        <option value="en">English</option>
        <option value="ar">Arabic</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="hi">Hindi</option>
        <option value="zh">Chinese</option>
      </select>
      <label>Audio Format Preference</label>
      <div class="checkbox-group" id="audioFmt">
        <span class="chip active" data-val="TrueHD">TrueHD Atmos</span>
        <span class="chip active" data-val="DTS-HD MA">DTS-HD MA</span>
        <span class="chip active" data-val="EAC3">DD+</span>
        <span class="chip active" data-val="AAC">AAC</span>
      </div>
      <label>Dub Language (optional)</label>
      <select id="dubLang">
        <option value="">None</option>
        <option value="ar">Arabic</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
      </select>
    </div>

    <div class="section">
      <h2>Subtitles</h2>
      <label>Preferred Subtitle Language</label>
      <select id="subLang">
        <option value="">None</option>
        <option value="ar">Arabic</option>
        <option value="en">English</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
      </select>
    </div>

    <div class="section">
      <h2>Limits</h2>
      <label>Max File Size (GB)</label>
      <input type="number" id="maxSize" value="80" min="1" max="200">
    </div>

    <div class="section">
      <h2>Stream Mode</h2>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="singleStream" style="width:auto;margin:0">
        <span>Single perfect stream (return only the best match)</span>
      </label>
    </div>

    <button class="btn" onclick="generate()">Generate Addon URL</button>

    <div class="result" id="result">
      <label>Your Addon URL (paste in Stremio)</label>
      <input type="text" id="addonUrl" readonly onclick="this.select()">
    </div>
  </div>

  <script>
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => chip.classList.toggle('active'));
    });

    function getActiveValues(id) {
      return [...document.querySelectorAll(`#${id} .chip.active`)].map(c => c.dataset.val);
    }

    function generate() {
      const cfg = {
        rdApiKey: document.getElementById('rdKey').value || undefined,
        tbApiKey: document.getElementById('tbKey').value || undefined,
        resolutions: getActiveValues('resolutions'),
        hdrFormats: getActiveValues('hdr'),
        audioLangs: [document.getElementById('audioLang').value],
        audioFormats: getActiveValues('audioFmt'),
        dubLang: document.getElementById('dubLang').value || undefined,
        subLang: document.getElementById('subLang').value || undefined,
        maxSizeGb: parseInt(document.getElementById('maxSize').value) || 80,
        singleStream: document.getElementById('singleStream').checked || undefined,
      };

      // Remove undefined keys
      Object.keys(cfg).forEach(k => cfg[k] === undefined && delete cfg[k]);

      const encoded = btoa(JSON.stringify(cfg)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
      const base = window.location.origin;
      const url = `${base}/${encoded}/manifest.json`;

      document.getElementById('addonUrl').value = url;
      document.getElementById('result').style.display = 'block';
    }

    // Load stats
    fetch('/api/stats').then(r => r.json()).then(data => {
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="num">${(data.content||0).toLocaleString()}</div><div class="label">Content</div></div>
        <div class="stat"><div class="num">${(data.files||0).toLocaleString()}</div><div class="label">Files</div></div>
        <div class="stat"><div class="num">${(data.mappings||0).toLocaleString()}</div><div class="label">Mappings</div></div>
        <div class="stat"><div class="num">${(data.debridCached||0).toLocaleString()}</div><div class="label">Debrid Cached</div></div>
      `;
    }).catch(() => {});
  </script>
</body>
</html>
