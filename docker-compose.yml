services:
  postgres:
    image: postgres:16-alpine
    container_name: streamdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: streamdb
      POSTGRES_USER: streamdb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-streamdb_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./shared/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - streamdb-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: streamdb-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://streamdb:${POSTGRES_PASSWORD:-streamdb_secret}@postgres:5432/streamdb
      PORT: 3000
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BASE_URL: ${BASE_URL:-https://streamdb.plaio.cc}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      PROBE_RD_API_KEY: ${PROBE_RD_API_KEY:-}
      PROBE_INTERVAL_MS: ${PROBE_INTERVAL_MS:-10000}
      PROBE_CONCURRENCY: ${PROBE_CONCURRENCY:-3}
      DHT_ENABLED: ${DHT_ENABLED:-true}
      DHT_PORT: ${DHT_PORT:-6881}
      ZILEAN_URL: ${ZILEAN_URL:-http://zilean:8181}
      ZILEAN_DB: postgres://zilean:${ZILEAN_PG_PASSWORD:-zilean_secret}@zilean-postgres:5432/zilean
      TORBOX_API_KEY: ${TORBOX_API_KEY:-}
    ports:
      - "${DHT_PORT:-6881}:${DHT_PORT:-6881}/udp"
    networks:
      - streamdb-internal
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.streamdb.rule=Host(`streamdb.plaio.cc`)"
      - "traefik.http.routers.streamdb.entrypoints=websecure"
      - "traefik.http.routers.streamdb.tls.certresolver=letsencrypt"
      - "traefik.http.services.streamdb.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_proxy"

  # Zilean — torrent index with IMDB→infohash mappings
  zilean-postgres:
    image: postgres:16-alpine
    container_name: zilean-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zilean
      POSTGRES_USER: zilean
      POSTGRES_PASSWORD: ${ZILEAN_PG_PASSWORD:-zilean_secret}
    command: >
      postgres
      -c shared_buffers=256MB
      -c work_mem=64MB
      -c maintenance_work_mem=256MB
      -c max_wal_size=1GB
    shm_size: '512mb'
    volumes:
      - zilean-pgdata:/var/lib/postgresql/data
    networks:
      - streamdb-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zilean"]
      interval: 10s
      timeout: 5s
      retries: 5

  zilean:
    image: ipromknight/zilean:latest
    container_name: zilean
    restart: unless-stopped
    depends_on:
      zilean-postgres:
        condition: service_healthy
    environment:
      Zilean__Database__ConnectionString: "Host=zilean-postgres;Port=5432;Database=zilean;Username=zilean;Password=${ZILEAN_PG_PASSWORD:-zilean_secret}"
      Zilean__Dmm__EnableScraping: "true"
      Zilean__Dmm__EnableEndpoint: "true"
      Zilean__Imdb__EnableImportMatching: "true"
      Zilean__Imdb__EnableEndpoint: "true"
    ports:
      - "8181:8181"
    networks:
      - streamdb-internal

volumes:
  pgdata:
  zilean-pgdata:

networks:
  streamdb-internal:
  traefik_proxy:
    external: true
