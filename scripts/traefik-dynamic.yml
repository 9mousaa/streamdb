http:
  middlewares:
    default-headers:
      headers:
        sslRedirect: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
  routers:
    host-shell:
      rule: "Host(`sh.plaio.cc`)"
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: host-shell
  services:
    host-shell:
      loadBalancer:
        servers:
          - url: "http://172.17.0.1:7777"
